aid: veryfi
name: Veryfi
description: >-
  Veryfi provides OCR APIs for extracting structured data from invoices,
  receipts, checks, purchase orders, and other financial documents in real time.
  The platform uses AI to capture line items, taxes, totals, barcodes, vendor
  details, and more across 91 currencies and 38 languages with enterprise-grade
  accuracy.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - AI
  - Document Processing
  - Invoices
  - OCR
  - Receipts
url: >-
  https://raw.githubusercontent.com/api-evangelist/veryfi/refs/heads/main/apis.yml
created: '2026-03-16'
modified: '2026-03-16'
specificationVersion: '0.19'
apis:
  - aid: veryfi:receipts-invoices-api
    name: Veryfi Receipts & Invoices API
    description: >-
      The Veryfi Receipts & Invoices API uses AI-powered OCR to extract
      structured JSON data from receipts, invoices, bills, and other financial
      documents. It supports documents in PDF and image formats and returns
      line-item level data including taxes, totals, vendor details, and barcodes.
    humanURL: https://docs.veryfi.com/
    tags:
      - Document Processing
      - Invoices
      - OCR
      - Receipts
    properties:
      - type: Documentation
        url: https://docs.veryfi.com/
      - type: Reference
        url: https://docs.veryfi.com/api/receipts-invoices/process-a-document/
  - aid: veryfi:w2-api
    name: Veryfi W2 API
    description: >-
      The Veryfi W2 API extracts structured data from W2 tax forms using
      AI-powered OCR, enabling automated processing of employee wage and tax
      documents.
    humanURL: https://docs.veryfi.com/api/w2s/
    tags:
      - OCR
      - Tax Forms
      - W2
    properties:
      - type: Documentation
        url: https://docs.veryfi.com/api/w2s/
  - aid: veryfi:bank-statements-api
    name: Veryfi Bank Statements API
    description: >-
      The Veryfi Bank Statements API extracts structured data from bank
      statements using AI-powered OCR, enabling automated reconciliation and
      financial data capture workflows.
    humanURL: https://docs.veryfi.com/api/bank-statements/
    tags:
      - Bank Statements
      - Finance
      - OCR
    properties:
      - type: Documentation
        url: https://docs.veryfi.com/api/bank-statements/
